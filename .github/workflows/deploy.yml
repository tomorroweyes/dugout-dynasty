name: Deploy to GitHub Pages (All Sites)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (Dugout Dynasty)
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build Dugout Dynasty
        run: npx vite build

      - name: Setup Node for Fantasy Tool
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'fantasy-draft-tool/package-lock.json'

      - name: Install dependencies (Fantasy Tool)
        working-directory: fantasy-draft-tool
        run: npm ci

      - name: Fetch data (Fantasy Tool)
        working-directory: fantasy-draft-tool
        run: npm run fetch-data

      - name: Build Fantasy Tool
        working-directory: fantasy-draft-tool
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          # Create artifact directory structure
          mkdir -p _pages
          # Copy Dugout Dynasty (root)
          cp -r dist/* _pages/
          # Copy Fantasy Tool (subdirectory)
          mkdir -p _pages/fantasy-draft-tool
          cp -r fantasy-draft-tool/dist/* _pages/fantasy-draft-tool/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages
          retention-days: 30

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
